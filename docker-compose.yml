version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ridemumbai_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ridemumbai_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ridemumbai_backend
    restart: always
    depends_on:
      - db
    ports:
      - "5000:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ridemumbai_local
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ridemumbai_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
